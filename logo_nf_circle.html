<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050505;
  width: 400px;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.circle {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  background: #050505;
  border: 1px solid rgba(212,175,55,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}
.inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.line {
  width: 50px;
  height: 1px;
  background: linear-gradient(to right, transparent, #D4AF37, transparent);
}
.sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.35em;
  color: rgba(212,175,55,0.7);
  text-transform: uppercase;
}
.letters {
  display: flex;
  align-items: flex-end;
  line-height: 1;
  margin-top: -10px;
}
.n {
  font-family: 'Cormorant Garamond', serif;
  font-size: 120px;
  font-weight: 300;
  color: #EDE0CC;
  letter-spacing: -0.12em;
  line-height: 1;
}
.f {
  font-family: 'Cormorant Garamond', serif;
  font-size: 140px;
  font-weight: 300;
  color: #D4AF37;
  line-height: 1;
  margin-bottom: -5px;
}
</style>
</head>
<body>
  <div class="circle">
    <div class="inner">
      <div class="letters">
        <span class="n">N</span><span class="f">F</span>
      </div>
      <div class="line"></div>
      <div class="sub">NortFinance</div>
    </div>
  </div>
  <button onclick="descargar()" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#D4AF37;color:#050505;border:none;padding:10px 20px;font-family:serif;font-size:14px;cursor:pointer;letter-spacing:0.1em;">DESCARGAR JPG</button>
<script>
function descargar() {
  html2canvas(document.querySelector('.circle'), {backgroundColor: '#050505', scale: 2}).then(canvas => {
    const a = document.createElement('a');
    a.download = 'logo_nf_circle.jpg';
    a.href = canvas.toDataURL('image/jpeg', 0.9);
    a.click();
  });
}
</script>
</body>
</html>
